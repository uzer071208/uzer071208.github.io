<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>KITA</title>
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #FFF9E6 0%, #FFE4B5 50%, #FFD6A5 100%);
            font-family: 'Quicksand', 'Poppins', system-ui, sans-serif;
            overflow-x: hidden;
            padding: 20px 16px 80px;
            min-height: 100vh;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle at 10% 20%, rgba(255, 200, 150, 0.25) 2%, transparent 2.5%),
                              radial-gradient(circle at 80% 70%, rgba(255, 180, 100, 0.2) 1.5%, transparent 2%);
            background-size: 45px 45px, 35px 35px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: bounceIn 0.8s ease;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #E86F00, #FF9F4A, #FFB347);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 2px 2px 10px rgba(255,150,50,0.2);
        }

        .header p {
            font-size: 0.9rem;
            color: #A85D00;
            font-weight: 500;
            background: rgba(255,245,220,0.7);
            display: inline-block;
            padding: 5px 18px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
        }

        .gallery-item {
            margin-bottom: 28px;
            border-radius: 28px;
            overflow: hidden;
            background: rgba(255, 250, 240, 0.9);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
            transform: translateY(40px) scale(0.95);
            opacity: 0;
            transition: all 0.6s cubic-bezier(0.34, 1.2, 0.64, 1);
        }

        .gallery-item.reveal {
            transform: translateY(0) scale(1);
            opacity: 1;
        }

        .gallery-item:hover {
            transform: translateY(-5px) scale(1.01);
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.15);
            transition: 0.3s;
        }

        .media-wrapper {
            width: 100%;
            position: relative;
            overflow: hidden;
            background: #FFF0DD;
        }

        .gallery-item img, .gallery-item video {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
            transition: transform 0.5s ease;
            background: #FFF0DD;
        }

        .gallery-item:hover img, .gallery-item:hover video {
            transform: scale(1.02);
        }

        .badge-type {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(255,255,240,0.9);
            backdrop-filter: blur(8px);
            padding: 5px 14px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 700;
            z-index: 2;
            pointer-events: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .badge-photo { background: #FF9F4A; color: white; }
        .badge-video { background: #FF6B6B; color: white; }

        .teks-narasi {
            background: rgba(255, 245, 225, 0.7);
            backdrop-filter: blur(12px);
            padding: 28px 20px;
            margin: 25px 0;
            font-size: 1rem;
            line-height: 1.7;
            text-align: center;
            color: #B85C00;
            border-radius: 50px;
            font-weight: 600;
            transform: translateY(30px);
            opacity: 0;
            transition: all 0.5s ease;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }

        .teks-narasi.reveal {
            transform: translateY(0);
            opacity: 1;
        }

        .footer {
            text-align: center;
            font-size: 0.7rem;
            color: #C2702E;
            margin-top: 45px;
            padding-top: 18px;
            border-top: 1px dashed rgba(200, 100, 0, 0.3);
        }

        .cassette-animation {
            position: fixed;
            bottom: 25px;
            right: 20px;
            z-index: 999;
            pointer-events: none;
        }

        .cassette-tape {
            width: 65px;
            height: 65px;
            background: linear-gradient(145deg, #3a3a3a, #1e1e1e);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
            border: 1px solid #FFB347;
            position: relative;
        }

        .reel-large {
            width: 32px;
            height: 32px;
            background: #FFB347;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 0 3px #FF8C42, 0 2px 5px rgba(0,0,0,0.3);
            animation: spinReel 1s linear infinite;
        }

        .reel-center {
            width: 10px;
            height: 10px;
            background: #2a2a2a;
            border-radius: 50%;
        }

        @keyframes spinReel {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .cassette-tape::before {
            content: "♪";
            position: absolute;
            bottom: -22px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: #FFB347;
            background: rgba(0,0,0,0.5);
            padding: 2px 8px;
            border-radius: 20px;
            white-space: nowrap;
            font-family: monospace;
            font-weight: bold;
            pointer-events: none;
        }

        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.8); }
            60% { opacity: 1; transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .gallery-item.reveal {
            animation: softPop 0.5s ease-out;
        }

        @keyframes softPop {
            0% { transform: scale(0.92); opacity: 0; }
            80% { transform: scale(1.02); }
            100% { transform: scale(1); opacity: 1; }
        }

        @media (max-width: 480px) {
            .cassette-animation {
                bottom: 15px;
                right: 12px;
            }
            .cassette-tape {
                width: 55px;
                height: 55px;
            }
            .reel-large {
                width: 28px;
                height: 28px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Grub Kita</h1>
        <p>kenapa namanya grub kita? hahaha</p>
    </div>

    <div id="galleryContainer"></div>

    <div class="footer">
        <i>I know people who come will go, but I hope we stay friends until we grow old.<br>love you all</i>
        <span style="color: #FF6B6B;"> ❤️</span>
    </div>
</div>

<!-- Animasi kaset di pojok kanan bawah -->
<div class="cassette-animation">
    <div class="cassette-tape">
        <div class="reel-large">
            <div class="reel-center"></div>
        </div>
    </div>
</div>

<script>
    // ========= KONFIGURASI FILE DI LUAR FOLDER =========
    // Semua file berada di folder yang SAMA dengan file HTML (root)
    // Foto: foto1.jpeg, foto2.jpeg, ... foto50.jpeg
    // Video: video1.mp4, video2.mp4, ... video8.mp4
    // Audio: music.mp3
    
    const TOTAL_FOTO = 50;
    const TOTAL_VIDEO = 8;
    
    // Membangun urutan: setiap 10 foto diselipkan 1 video
    function buildGallerySequence() {
        const items = [];
        let fotoCounter = 1;
        let videoCounter = 1;
        
        // 5 blok: masing-masing 10 foto + 1 video (sampai video ke-5)
        for (let blok = 0; blok < 5; blok++) {
            for (let i = 0; i < 10 && fotoCounter <= TOTAL_FOTO; i++) {
                items.push({
                    type: 'foto',
                    number: fotoCounter,
                    src: `foto${fotoCounter}.jpeg`
                });
                fotoCounter++;
            }
            if (videoCounter <= TOTAL_VIDEO) {
                items.push({
                    type: 'video',
                    number: videoCounter,
                    src: `video${videoCounter}.mp4`,
                    poster: `foto${Math.min(fotoCounter-1, TOTAL_FOTO)}.jpeg`
                });
                videoCounter++;
            }
        }
        
        // Sisa foto
        while (fotoCounter <= TOTAL_FOTO) {
            items.push({ type: 'foto', number: fotoCounter, src: `foto${fotoCounter}.jpeg` });
            fotoCounter++;
        }
        
        // Sisa video (video ke-6,7,8)
        while (videoCounter <= TOTAL_VIDEO) {
            items.push({ 
                type: 'video', 
                number: videoCounter, 
                src: `video${videoCounter}.mp4`, 
                poster: `foto${TOTAL_FOTO}.jpeg` 
            });
            videoCounter++;
        }
        
        return items;
    }
    
    const galleryItems = buildGallerySequence();
    const galleryContainer = document.getElementById('galleryContainer');
    
    // Teks narasi
    const narasiList = [
        "walau pada akhirnya kita bakal pisah buat ngejar mimpi masing-masing, semoga kita ngga asing dan tetap terus bertegur sapa, senang bisa bertemu kalian",
        "semoga langkahmu selalu ditemani takdir yang bersahabat dan harapan yang tak pernah lelah berjalan",
        "semoga hari - hari mu selalu dipenuhi kebaikan dan keindahan, semoga semesta berpihak padamu, dan setiap langkahmu dimudahkan menuju masa depan yang cerah. teruslah berkembang, teruslah melangkah, dan temukan kebahagiaanmu",
        "untuk segala yang dibalas dan tak terbalas, semoga yang baik kembali kepadamu, dan yang buruk tersimpan di ruang hati yang paling ikhlas",
        "Jika dunia adalah sebuah buku, maka setiap halaman tentangmu adalah bab yang tak pernah ingin kututup. Jika waktu adalah sungai, maka kehadiranmu adalah arus yang membuatku rela hanyut tanpa pernah ingin kembali ke tepian. Kau bukan sekadar manusia bagiku, Kau adalah rumah. Tempat segala resah menemukan damai, tempat segala lelah menemukan arti",
        "people come and go, selamat membangun mimpi baru. selamat memperjuangkan kehidupan, semoga doa baik selalu memelukmu"
    ];
    
    function renderGallery() {
        galleryContainer.innerHTML = '';
        addNarasiBlock(narasiList[0]);
        
        let narasiIndex = 1;
        let itemCount = 0;
        
        galleryItems.forEach((item, idx) => {
            const itemDiv = document.createElement('div');
            itemDiv.className = 'gallery-item';
            
            const mediaWrapper = document.createElement('div');
            mediaWrapper.className = 'media-wrapper';
            mediaWrapper.style.position = 'relative';
            
            const badge = document.createElement('div');
            badge.className = `badge-type ${item.type === 'foto' ? 'badge-photo' : 'badge-video'}`;
            badge.innerHTML = item.type === 'foto' ? 'FOTO' : 'VIDEO';
            mediaWrapper.appendChild(badge);
            
            if (item.type === 'foto') {
                const img = document.createElement('img');
                img.src = item.src;
                img.alt = `Kenangan ${item.number}`;
                img.loading = 'lazy';
                img.onerror = function() {
                    if (this.src.endsWith('.jpeg')) {
                        this.src = this.src.replace('.jpeg', '.jpg');
                    } else if (this.src.endsWith('.jpg')) {
                        this.src = this.src.replace('.jpg', '.png');
                    } else {
                        this.src = 'https://picsum.photos/id/104/800/600';
                    }
                };
                mediaWrapper.appendChild(img);
            } else {
                const video = document.createElement('video');
                video.src = item.src;
                video.poster = item.poster || 'https://picsum.photos/id/20/800/450';
                video.muted = true;
                video.loop = true;
                video.playsInline = true;
                video.setAttribute('playsinline', '');
                video.addEventListener('click', () => {
                    if (video.paused) video.play().catch(e=>console.log);
                    else video.pause();
                });
                video.onerror = function() {
                    this.src = 'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4';
                };
                mediaWrapper.appendChild(video);
            }
            
            itemDiv.appendChild(mediaWrapper);
            galleryContainer.appendChild(itemDiv);
            itemCount++;
            
            if (itemCount % 12 === 0 && narasiIndex < narasiList.length) {
                addNarasiBlock(narasiList[narasiIndex]);
                narasiIndex++;
            }
        });
        
        while (narasiIndex < narasiList.length) {
            addNarasiBlock(narasiList[narasiIndex]);
            narasiIndex++;
        }
        
        setupScrollAnimation();
        setupVideoAutoPlay();
    }
    
    function addNarasiBlock(teks) {
        const narasiDiv = document.createElement('div');
        narasiDiv.className = 'teks-narasi';
        narasiDiv.innerHTML = teks;
        galleryContainer.appendChild(narasiDiv);
    }
    
    function setupScrollAnimation() {
        const itemsToAnimate = document.querySelectorAll('.gallery-item, .teks-narasi');
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('reveal');
                    observer.unobserve(entry.target);
                }
            });
        }, { threshold: 0.2, rootMargin: "0px 0px -20px 0px" });
        itemsToAnimate.forEach(el => observer.observe(el));
    }
    
    function setupVideoAutoPlay() {
        const videos = document.querySelectorAll('video');
        const videoObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.play().catch(e=>console.log);
                } else {
                    entry.target.pause();
                }
            });
        }, { threshold: 0.3 });
        videos.forEach(video => videoObserver.observe(video));
    }
    
    // ========= SISTEM AUDIO AUTOPLAY =========
    // Audio berada di folder yang sama: music.mp3
    const audio = new Audio();
    audio.src = "music.mp3";
    audio.loop = true;
    audio.volume = 0.5;
    audio.preload = "auto";
    
    let autoplayAttempts = 0;
    const maxAttempts = 30;
    
    function forceAutoPlay() {
        audio.play().then(() => {
            console.log("Audio autoplay berhasil! Musik kenangan mengalun.");
        }).catch((err) => {
            console.log("Autoplay attempt", autoplayAttempts + 1, "gagal:", err);
            autoplayAttempts++;
            if (autoplayAttempts < maxAttempts) {
                setTimeout(forceAutoPlay, 200);
            } else {
                const fallbackPlay = () => {
                    audio.play().catch(e=>console.log);
                    window.removeEventListener('scroll', fallbackPlay);
                    document.body.removeEventListener('touchstart', fallbackPlay);
                };
                window.addEventListener('scroll', fallbackPlay, { once: true });
                document.body.addEventListener('touchstart', fallbackPlay, { once: true });
            }
        });
    }
    
    window.addEventListener('load', () => {
        renderGallery();
        forceAutoPlay();
    });
    
    audio.addEventListener('error', () => {
        console.warn("Audio error, mencoba sumber cadangan...");
        audio.src = "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3";
        audio.load();
        forceAutoPlay();
    });
    
    // Efek tap pada gambar
    document.addEventListener('click', (e) => {
        const media = e.target.closest('img, video');
        if (media) {
            media.style.transform = 'scale(0.98)';
            setTimeout(() => { media.style.transform = ''; }, 150);
        }
    });
    
    console.log("Tema cerah siap! File berada di luar folder (satu folder dengan HTML).");
    console.log("Foto: foto1.jpeg s/d foto50.jpeg");
    console.log("Video: video1.mp4 s/d video8.mp4");
    console.log("Audio: music.mp3");
</script>
</body>
</html>
